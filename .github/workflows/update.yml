name: weekly-update

on:
  schedule:
    - cron: '0 5 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update data
        run: python update_data.py

      - name: Commit changes
        run: |
          git config user.name "auto-update"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "weekly data update" || echo "no changes"
          git push

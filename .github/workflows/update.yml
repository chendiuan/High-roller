name: 每週更新資料

on:
  schedule:
    - cron: '0 5 * * 6'   # 每週六 13:00（台灣時間）
  workflow_dispatch:        # 也可以手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 更新資料
        run: python update_data.py

      - name: 提交變更
        run: |
          git config user.name "auto-update"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "每週資料更新 $(date +%F)" || echo "沒有變更"
          git push

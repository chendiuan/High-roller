name: backfill-history

on:
  workflow_dispatch:
    inputs:
      weeks:
        description: 'Weeks to backfill'
        default: '4'
        required: true

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backfill history
        run: python backfill_history.py --weeks ${{ inputs.weeks }}

      - name: Rebuild data
        run: python update_data.py

      - name: Commit changes
        run: |
          git config user.name "auto-update"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "backfill history" || echo "no changes"
          git push

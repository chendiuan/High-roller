<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>大戶加碼篩選</title>
<style>
:root{--bg:#0b0f1a;--card:#141a2a;--card2:#1a2136;--ink:#e8ecf5;--sub:#8b93a7;
--line:#232b42;--accent:#f5a623;--accent-ink:#2a1d00;--up:#ff5d55;--dn:#35c584;
--blue:#5b8def}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Microsoft JhengHei","PingFang TC",sans-serif;
background:var(--bg);color:var(--ink);padding:20px 24px;max-width:1240px;margin:0 auto;
font-variant-numeric:tabular-nums}
h1{font-size:22px;display:flex;align-items:center;gap:8px}
.meta{color:var(--sub);font-size:13px;margin:6px 0 16px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;
padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px 26px;
align-items:center}
.grp{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lbl{font-size:12.5px;color:var(--sub);flex:none}
.chip{border:1px solid var(--line);background:var(--card2);border-radius:20px;
padding:6px 14px;font-size:13.5px;cursor:pointer;user-select:none;color:var(--ink)}
.chip:hover{border-color:#33406b}
.chip.on{background:var(--accent);border-color:var(--accent);
color:var(--accent-ink);font-weight:700}
.chip.on.dn{background:#123527;border-color:#1f5c41;color:#4fe3a3}
input[type=search]{border:1px solid var(--line);background:var(--card2);
color:var(--ink);border-radius:20px;padding:7px 14px;font-size:13.5px;outline:none;
width:220px}
input::placeholder{color:var(--sub)}
select{border:1px solid var(--line);background:var(--card2);color:var(--ink);
border-radius:8px;padding:6px 8px;font-size:13.5px}
.note{background:#2a2210;border:1px solid #4a3a12;color:#e8c56b;border-radius:12px;
padding:12px 14px;font-size:13.5px;line-height:1.7;margin-bottom:14px}

/* ===== 桌面：表格式 ===== */
.grid{display:grid;align-items:center;
grid-template-columns:44px minmax(200px,1.2fr) minmax(90px,0.9fr) 190px 96px 110px 84px 150px 56px;
gap:0 12px}
.hrow{composes:grid}
.hrow{padding:6px 16px;color:var(--sub);font-size:12px}
.hrow .r{text-align:right}
.item-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;
margin-bottom:6px;cursor:pointer}
.item-wrap:hover{border-color:#33406b;background:#161d30}
.item{padding:11px 16px}
.rank{font-weight:800;color:var(--accent);font-size:15px;
border-left:3px solid var(--accent);padding-left:9px}
.code{color:var(--sub);font-size:13px;margin-right:6px}
.name{font-weight:700;font-size:15.5px}
.px{font-size:13.5px;font-weight:600;color:var(--ink);margin-left:8px}
.tag{font-size:11px;color:var(--sub);border:1px solid var(--line);
border-radius:10px;padding:1px 8px;margin-right:4px;white-space:nowrap}
.pos,.units,.ppl{font-size:14px;text-align:right;white-space:nowrap}
.pos b{font-weight:700}
.chg{font-weight:800;font-size:15.5px;text-align:right;white-space:nowrap}
.chg.up{color:var(--accent)}.chg.dn{color:var(--dn)}
.range{font-size:13.5px;color:var(--up);font-weight:600;text-align:right;white-space:nowrap}
.range:empty::after{content:""}
a{color:var(--blue);text-decoration:none;font-size:13px}
.lk{text-align:right}
.detail{display:none;margin:0 16px;border-top:1px dashed var(--line);
padding:12px 0 14px;cursor:default}
.item-wrap.open .detail{display:block}
.detail table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.detail th,.detail td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--line)}
.detail th{color:var(--sub);font-weight:600}
.detail th:first-child,.detail td:first-child{text-align:left}
.spark{width:100%;height:64px;margin-top:4px}
.more{display:block;margin:16px auto;border:1px solid var(--line);
background:var(--card2);color:var(--ink);border-radius:20px;padding:9px 26px;
font-size:13.5px;cursor:pointer}
.empty{text-align:center;color:var(--sub);padding:36px 0;font-size:14px}
.tabs{display:flex;gap:8px;margin:14px 0 16px}
.tab-btn{border:1px solid var(--line);background:var(--card2);color:var(--ink);border-radius:20px;
padding:8px 16px;font-size:13.5px;cursor:pointer}
.tab-btn.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:700}
.tab-page{display:none}.tab-page.on{display:block}
.yt-toolbar{justify-content:space-between}
.yt-list{display:grid;gap:12px}
.yt-card{display:grid;grid-template-columns:220px 1fr;gap:16px;background:var(--card);
border:1px solid var(--line);border-radius:12px;padding:14px}
.yt-thumb{display:block;aspect-ratio:16/9;background:#0f1421;border-radius:8px;overflow:hidden}
.yt-thumb img{width:100%;height:100%;object-fit:cover}
.yt-channel{color:var(--accent);font-size:12.5px;font-weight:700;margin-bottom:4px}
.yt-title{font-size:17px;font-weight:800;line-height:1.35;margin-bottom:6px}
.yt-title a{color:var(--ink);font-size:17px}
.yt-meta{color:var(--sub);font-size:12.5px;margin-bottom:8px}
.yt-section{margin-top:10px}
.yt-section b{display:block;font-size:12.5px;color:var(--sub);margin-bottom:5px}
.yt-section ul{padding-left:18px;color:#cbd2df;font-size:13.5px;line-height:1.65}
.yt-gist{font-size:14px;line-height:1.65;color:#dfe4ee}
.yt-transcript{display:inline-block;color:#b9c2d3;background:#202840;border:1px solid var(--line);
border-radius:14px;padding:3px 9px;font-size:12px;margin:4px 0 8px}
.yt-basis{font-size:12.5px;color:var(--sub);margin-top:10px;line-height:1.55}
.yt-watch{display:inline-block;margin-top:10px;background:var(--accent);color:var(--accent-ink);
font-weight:800;border-radius:18px;padding:7px 14px;font-size:13px}

/* ===== Agent 分頁（股票分析） ===== */
.agent-list{display:grid;gap:12px}
.agent-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.agent-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.agent-head .name{font-size:16.5px}
.badge{font-size:11.5px;font-weight:700;border-radius:10px;padding:2px 9px;white-space:nowrap}
.badge.up{background:#2a2210;color:var(--accent);border:1px solid #4a3a12}
.badge.dn{background:#123527;color:#4fe3a3;border:1px solid #1f5c41}
.agent-narrative{font-size:13.5px;line-height:1.7;color:#dfe4ee;margin:6px 0 10px}
.agent-metrics{display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;color:var(--sub);margin-bottom:8px}
.agent-metrics b{color:var(--ink);font-size:13.5px}
.peer-table{width:100%;border-collapse:collapse;font-size:12.5px;margin:8px 0}
.peer-table th,.peer-table td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--line)}
.peer-table th{color:var(--sub);font-weight:600}
.peer-table th:first-child,.peer-table td:first-child{text-align:left}
.peer-table tr.focus{background:#1a2136}
.peer-table tr.focus td:first-child{color:var(--accent);font-weight:700}
.mini-video{border-top:1px dashed var(--line);padding:8px 0;font-size:12.5px}
.mini-video a{font-size:13px;font-weight:600}
.mini-video .ch{color:var(--sub);font-size:11.5px;margin-left:6px}
.checklist{padding-left:18px;color:#cbd2df;font-size:13px;line-height:1.7;margin:6px 0}
.agent-links{margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
.alignment{font-size:12.5px;color:var(--sub);margin:4px 0}
.alignment b{color:var(--ink)}

/* ===== 窄螢幕：卡片式 ===== */
@media (max-width:920px){
  body{padding:14px}
  .hrow{display:none}
  .grid{display:flex;flex-wrap:wrap;gap:4px 12px;align-items:baseline}
  .pos,.units,.ppl,.chg,.range{text-align:left;font-size:12.5px}
  .pos::before{content:"持股比 ";color:var(--sub);font-size:12px}
  .units::before{content:"張數 ";color:var(--sub);font-size:12px}
  .ppl::before{content:"人數 ";color:var(--sub);font-size:12px}
  .range::before{content:"區間 ";color:var(--sub);font-size:12px}
  .chg{margin-left:auto;order:10}
  input[type=search]{width:100%}
  .yt-card{grid-template-columns:1fr}
}
</style>
</head>
<body>
<h1>🏆 大戶加碼篩選</h1>
<div class="tabs">
  <button class="tab-btn on" id="stockTab">大戶篩選</button>
  <button class="tab-btn" id="youtubeTab">YouTube 分析</button>
  <button class="tab-btn" id="mrTab">🔎 市場研究員</button>
  <button class="tab-btn" id="mbTab">📐 建模助手</button>
  <button class="tab-btn" id="erTab">📄 財報審閱</button>
</div>

<section class="tab-page on" id="stockPage">
  <div class="meta" id="meta">載入中…</div>
  <div id="notice"></div>
  <div class="panel">
    <span class="grp"><span class="lbl">大戶門檻</span><span id="thr"></span></span>
    <span class="grp"><span class="lbl">比較區間</span><span id="win"></span></span>
    <span class="grp">
      <span class="chip on" id="dirUp">🔥 加碼</span>
      <span class="chip" id="dirDn">🧊 減碼</span>
    </span>
    <span class="grp"><span class="lbl">市場</span>
      <select id="mkt"><option value="">全部</option><option>上市</option><option>上櫃</option></select>
    </span>
    <span class="grp"><span class="lbl">排序</span>
      <select id="sort"><option value="pp">持股比增減(pp)</option><option value="units">張數變化</option></select>
    </span>
    <span class="grp">
      <select id="minPct"><option value="0">持股比不限</option><option value="10">≥10%</option>
      <option value="20">≥20%</option><option value="30">≥30%</option><option value="40">≥40%</option></select>
    </span>
    <span class="grp"><input type="search" id="q" placeholder="搜尋代號或名稱…"></span>
  </div>
  <div class="hrow grid">
    <span>#</span><span>股票</span><span>市場 / 產業</span>
    <span class="r">大戶持股比</span><span class="r">增減</span>
    <span class="r">張數變化</span><span class="r">人數</span>
    <span class="r">區間(盤中低~高)</span><span class="r">行情</span>
  </div>
  <div id="list"></div>
  <button class="more" id="more" style="display:none">顯示更多</button>
</section>

<section class="tab-page" id="youtubePage">
  <div class="meta" id="ytMeta">載入 YouTube 分析中…</div>
  <div id="ytNotice"></div>
  <div class="panel yt-toolbar">
    <span class="grp"><span class="lbl">頻道</span><select id="ytChannel"><option value="">全部</option></select></span>
    <span class="grp"><input type="search" id="ytSearch" placeholder="搜尋影片或重點…"></span>
  </div>
  <div class="yt-list" id="ytList"></div>
  <button class="more" id="ytMore" style="display:none">顯示更多</button>
</section>

<section class="tab-page" id="mrPage">
  <div class="meta" id="mrMeta">載入市場研究員分析中…</div>
  <div id="mrNotice"></div>
  <div class="panel"><span class="grp"><input type="search" id="mrSearch" placeholder="搜尋代號或個股名稱…"></span></div>
  <div class="agent-list" id="mrList"></div>
  <button class="more" id="mrMore" style="display:none">顯示更多</button>
</section>

<section class="tab-page" id="mbPage">
  <div class="meta" id="mbMeta">載入建模助手分析中…</div>
  <div id="mbNotice"></div>
  <div class="panel"><span class="grp"><input type="search" id="mbSearch" placeholder="搜尋代號或個股名稱…"></span></div>
  <div class="agent-list" id="mbList"></div>
  <button class="more" id="mbMore" style="display:none">顯示更多</button>
</section>

<section class="tab-page" id="erPage">
  <div class="meta" id="erMeta">載入財報審閱分析中…</div>
  <div id="erNotice"></div>
  <div class="panel"><span class="grp"><input type="search" id="erSearch" placeholder="搜尋代號或個股名稱…"></span></div>
  <div class="agent-list" id="erList"></div>
  <button class="more" id="erMore" style="display:none">顯示更多</button>
</section>

<script src="data.js"></script>
<script src="youtube_data.js"></script>
<script src="agent_data.js"></script>
<script>
(function(){
const tabs=[
  {btn:'stockTab',page:'stockPage'},
  {btn:'youtubeTab',page:'youtubePage'},
  {btn:'mrTab',page:'mrPage'},
  {btn:'mbTab',page:'mbPage'},
  {btn:'erTab',page:'erPage'},
].map(t=>({btn:document.getElementById(t.btn),page:document.getElementById(t.page)}));
function show(active){
  tabs.forEach(t=>{
    const on=t.btn===active;
    t.btn.className='tab-btn'+(on?' on':'');
    t.page.className='tab-page'+(on?' on':'');
  });
}
tabs.forEach(t=>{t.btn.onclick=()=>show(t.btn);});
})();

(function(){
const $=id=>document.getElementById(id);
if(!window.TDCC_DATA){
  $('meta').textContent='';
  $('notice').innerHTML='<div class="note">找不到 <b>data.js</b>。請先執行 <b>update_data.py</b> 產生資料，再重新整理本頁。</div>';
  return;
}
const D=window.TDCC_DATA, dates=D.dates, stocks=D.stocks;
const fmtD=s=>s.slice(4,6)+'/'+s.slice(6,8);
const state={thr:'400',win:2,dir:1,mkt:'',sort:'pp',q:'',minPct:0,shown:50};

function chips(el,opts,cur,fn,cls){
  el.innerHTML='';
  opts.forEach(o=>{
    const s=document.createElement('span');
    s.className='chip'+(String(o.v)===String(cur)?' on'+(cls||''):'');
    s.textContent=o.t;s.onclick=()=>fn(o.v);
    el.appendChild(s);el.appendChild(document.createTextNode(' '));
  });
}
function dateIdxForWin(w){
  const last=dates[dates.length-1];
  const t=new Date(+last.slice(0,4),+last.slice(4,6)-1,+last.slice(6,8));
  t.setDate(t.getDate()-7*w);
  let best=-1,bd=1e9;
  for(let i=0;i<dates.length-1;i++){
    const d=new Date(+dates[i].slice(0,4),+dates[i].slice(4,6)-1,+dates[i].slice(6,8));
    const diff=Math.abs((d-t)/864e5);
    if(diff<bd){bd=diff;best=i;}
  }
  return best;
}
function render(){
  chips($('thr'),[{v:'200',t:'200張↑'},{v:'400',t:'400張↑'},{v:'600',t:'600張↑'},
    {v:'800',t:'800張↑'},{v:'1000',t:'1000張↑'}],state.thr,v=>{state.thr=v;state.shown=50;render();});
  chips($('win'),[1,2,3,4].map(w=>({v:w,t:w+'週'})),state.win,v=>{state.win=v;state.shown=50;render();});
  $('dirUp').className='chip'+(state.dir>0?' on':'');
  $('dirDn').className='chip'+(state.dir<0?' on dn':'');

  const li=dates.length-1;
  if(dates.length<2){
    $('meta').textContent='資料日期：'+fmtD(dates[0])+'（僅一週）';
    $('notice').innerHTML='<div class="note">目前只有 <b>1 週</b> 快照，還無法計算加碼變化。</div>';
    $('list').innerHTML='';$('more').style.display='none';return;
  }
  const ai=dateIdxForWin(state.win);
  $('meta').textContent='比較區間：'+fmtD(dates[ai])+' → '+fmtD(dates[li])
    +'　·　資料共 '+dates.length+' 週　·　更新於 '+(D.generated||'');
  $('notice').innerHTML='';

  const rows=[];
  for(const code in stocks){
    const st=stocks[code];
    if(state.mkt&&st.m!==state.mkt)continue;
    if(state.q){
      const q=state.q.toLowerCase();
      if(!code.includes(q)&&!(st.n||'').toLowerCase().includes(q))continue;
    }
    const t=st.t[state.thr];
    const pa=t.p[ai],pb=t.p[li];
    if(pa==null||pb==null)continue;
    if(pb<state.minPct)continue;
    const dp=+(pb-pa).toFixed(2);
    const du=(t.u[li]-t.u[ai])/1000;
    const dc=t.c[li]-t.c[ai];
    let lo=null,hi=null;
    if(dp>0){
      const hl=st.hl||[];
      for(let i=ai;i<=li;i++){
        const v=hl[i];
        if(!v)continue;
        lo=lo==null?v[0]:Math.min(lo,v[0]);
        hi=hi==null?v[1]:Math.max(hi,v[1]);
      }
    }
    rows.push({code,st,pa,pb,dp,du,dc,lo,hi,ai,li});
  }
  rows.sort((a,b)=>state.dir*((state.sort==='pp'?b.dp-a.dp:b.du-a.du)));
  const list=$('list');list.innerHTML='';
  if(!rows.length){list.innerHTML='<div class="empty">沒有符合條件的股票</div>';}
  rows.slice(0,state.shown).forEach((r,i)=>{
    const wrap=document.createElement('div');wrap.className='item-wrap';
    const cls=r.dp>=0?'up':'dn';
    const yurl='https://tw.stock.yahoo.com/quote/'+r.code+(r.st.m==='上櫃'?'.TWO':'.TW');
    wrap.innerHTML='<div class="item grid">'
      +'<span class="rank">'+(i+1)+'</span>'
      +'<span><span class="code">'+r.code+'</span><span class="name">'+(r.st.n||'')+'</span>'
      +(r.st.pr?'<span class="px">'+r.st.pr+'</span>':'')+'</span>'
      +'<span>'+(r.st.m?'<span class="tag">'+r.st.m+'</span>':'')
      +(r.st.i?'<span class="tag">'+r.st.i+'</span>':'')+'</span>'
      +'<span class="pos">'+r.pa.toFixed(2)+'% → <b>'+r.pb.toFixed(2)+'%</b></span>'
      +'<span class="chg '+cls+'">'+(r.dp>0?'+':'')+r.dp.toFixed(2)+'pp</span>'
      +'<span class="units">'+(r.du>0?'+':'')+Math.round(r.du).toLocaleString()+' 張</span>'
      +'<span class="ppl">'+(r.dc>0?'+':'')+r.dc.toLocaleString()+'</span>'
      +'<span class="range">'+(r.lo!=null&&r.hi!=null?r.lo+' ~ '+r.hi:'')+'</span>'
      +'<span class="lk"><a href="'+yurl+'" target="_blank" onclick="event.stopPropagation()">行情 ↗</a></span>'
      +'</div><div class="detail"></div>';
    wrap.onclick=()=>{wrap.classList.toggle('open');
      if(wrap.classList.contains('open'))detail(wrap.querySelector('.detail'),r);};
    list.appendChild(wrap);
  });
  $('more').style.display=rows.length>state.shown?'block':'none';
}
function detail(el,r){
  const t=r.st.t[state.thr];
  const pts=t.p.map((v,i)=>({v,i})).filter(o=>o.v!=null);
  let svg='';
  if(pts.length>=2){
    const vs=pts.map(o=>o.v),mn=Math.min(...vs),mx=Math.max(...vs),sp=(mx-mn)||1;
    const W=1100,H=56;
    const xy=pts.map((o,k)=>[(k/(pts.length-1))*W, H-4-((o.v-mn)/sp)*(H-12)]);
    svg='<svg class="spark" viewBox="0 0 '+W+' '+(H+14)+'" preserveAspectRatio="none">'
      +'<polyline fill="none" stroke="#f5a623" stroke-width="2.5" points="'
      +xy.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'"/>'
      +xy.map(p=>'<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3.5" fill="#f5a623"/>').join('')
      +'</svg>';
  }
  const hl=r.st.hl||[];
  let tbl='<table><tr><th>週別</th><th>持股比%</th><th>股數(張)</th><th>人數</th><th>當週區間(低~高)</th></tr>';
  t.p.forEach((v,i)=>{
    if(v==null)return;
    tbl+='<tr><td>'+fmtD(dates[i])+'</td><td>'+v.toFixed(2)+'</td>'
      +'<td>'+Math.round(t.u[i]/1000).toLocaleString()+'</td>'
      +'<td>'+t.c[i].toLocaleString()+'</td>'
      +'<td>'+(hl[i]?hl[i][0]+' ~ '+hl[i][1]:'—')+'</td></tr>';
  });
  tbl+='</table>';
  const range=(r.lo!=null&&r.hi!=null)?'<div style="font-size:12.5px;color:var(--sub);margin-top:8px">'
    +'期間股價區間（盤中低~高） <b style="color:var(--ink)">'+r.lo+' ~ '+r.hi+'</b> 元</div>':'';
  el.innerHTML='<div style="font-size:12.5px;color:var(--sub)">'+state.thr
    +'張以上大戶持股比走勢</div>'+svg+tbl+range;
  el.onclick=e=>e.stopPropagation();
}
$('dirUp').onclick=()=>{state.dir=1;state.shown=50;render();};
$('dirDn').onclick=()=>{state.dir=-1;state.shown=50;render();};
$('mkt').onchange=e=>{state.mkt=e.target.value;state.shown=50;render();};
$('sort').onchange=e=>{state.sort=e.target.value;render();};
$('minPct').onchange=e=>{state.minPct=+e.target.value;state.shown=50;render();};
$('q').oninput=e=>{state.q=e.target.value.trim();state.shown=50;render();};
$('more').onclick=()=>{state.shown+=50;render();};
render();
})();

(function(){
const $=id=>document.getElementById(id);
const Y=window.YOUTUBE_WATCHLIST;
const state={channel:'',q:'',shown:20};
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function localTime(s){
  if(!s)return '';
  const d=new Date(s);
  return isNaN(d)?s:d.toLocaleString('zh-TW',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function renderYt(){
  if(!Y){
    $('ytMeta').textContent='';
    $('ytNotice').innerHTML='<div class="note">找不到 <b>youtube_data.js</b>。請先執行 <b>youtube_watchlist.py</b>，或等待 GitHub Actions 每天 06:00 自動更新。</div>';
    $('ytList').innerHTML='';
    return;
  }
  const videos=Y.recent_videos||Y.new_videos||[];
  $('ytMeta').textContent='更新於 '+(Y.generated||'')+' · 已整理 '+videos.length+' 支影片 · 新影片 '+((Y.new_videos||[]).length)+' 支';
  $('ytNotice').innerHTML=Y.source_basis?'<div class="note">'+esc(Y.source_basis)+'</div>':'';
  const channels=[...new Set(videos.map(v=>v.channel_name).filter(Boolean))];
  const sel=$('ytChannel'), cur=sel.value||state.channel;
  sel.innerHTML='<option value="">全部</option>'+channels.map(c=>'<option>'+esc(c)+'</option>').join('');
  sel.value=cur;
  const rows=videos.filter(v=>{
    if(state.channel&&v.channel_name!==state.channel)return false;
    if(state.q){
      const a=v.analysis||{}, text=[v.title,v.channel_name,a.gist,(a.key_points||[]).join(' '),(a.watch_focus||[]).join(' ')].join(' ').toLowerCase();
      if(!text.includes(state.q.toLowerCase()))return false;
    }
    return true;
  });
  $('ytList').innerHTML=rows.slice(0,state.shown).map(v=>{
    const a=v.analysis||{}, points=a.key_points||[], focus=a.watch_focus||[], verify=a.verify||[];
    const timeline=Array.isArray(a.timeline)?a.timeline:[];
    const topics=Array.isArray(a.mentioned_topics)?a.mentioned_topics:[];
    const tr=v.transcript||{};
    const trLabel=tr.status==='ok'
      ?'已取得逐字稿'+(tr.char_count?' · '+Number(tr.char_count).toLocaleString()+' 字':'')
      :'無逐字稿 · '+(tr.status||'unavailable');
    return '<article class="yt-card">'
      +'<a class="yt-thumb" href="'+esc(v.url)+'" target="_blank" rel="noreferrer">'+(v.thumbnail?'<img src="'+esc(v.thumbnail)+'" alt="">':'')+'</a>'
      +'<div><div class="yt-channel">'+esc(v.channel_name)+'</div>'
      +'<div class="yt-title"><a href="'+esc(v.url)+'" target="_blank" rel="noreferrer">'+esc(v.title)+'</a></div>'
      +'<div class="yt-meta">'+esc(localTime(v.published))+'</div>'
      +'<div class="yt-transcript">'+esc(trLabel)+'</div>'
      +'<div class="yt-gist">'+esc(a.gist||'尚無摘要。')+'</div>'
      +(points.length?'<div class="yt-section"><b>重點整理</b><ul>'+points.map(p=>'<li>'+esc(p)+'</li>').join('')+'</ul></div>':'')
      +(timeline.length?'<div class="yt-section"><b>時間軸摘要</b><ul>'+timeline.map(p=>'<li>'+esc((p.time?p.time+' ':'')+(p.summary||p))+'</li>').join('')+'</ul></div>':'')
      +(topics.length?'<div class="yt-section"><b>提到的主題</b><ul>'+topics.map(p=>'<li>'+esc(p)+'</li>').join('')+'</ul></div>':'')
      +(focus.length?'<div class="yt-section"><b>分析與觀看焦點</b><ul>'+focus.map(p=>'<li>'+esc(p)+'</li>').join('')+'</ul></div>':'')
      +(verify.length?'<div class="yt-section"><b>查證提醒</b><ul>'+verify.map(p=>'<li>'+esc(p)+'</li>').join('')+'</ul></div>':'')
      +'<div class="yt-basis">'+esc(a.basis||Y.source_basis||'')+'</div>'
      +'<a class="yt-watch" href="'+esc(v.url)+'" target="_blank" rel="noreferrer">觀看影片</a></div></article>';
  }).join('')||'<div class="empty">沒有符合條件的影片</div>';
  $('ytMore').style.display=rows.length>state.shown?'block':'none';
}
$('ytChannel').onchange=e=>{state.channel=e.target.value;state.shown=20;renderYt();};
$('ytSearch').oninput=e=>{state.q=e.target.value.trim();state.shown=20;renderYt();};
$('ytMore').onclick=()=>{state.shown+=20;renderYt();};
renderYt();
})();

(function(){
const $=id=>document.getElementById(id);
const A=window.AGENT_DATA;
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function localTime(s){
  if(!s)return '';
  const d=new Date(s);
  return isNaN(d)?s:d.toLocaleString('zh-TW',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function metaLine(total,shown,q){
  let s='更新於 '+(A.generated||'')+' · 比較區間 '+(A.window_desc||'')+' · 共 '+total+' 檔個股（大戶'+(A.threshold||'')+'張以上門檻，可搜尋任一檔）';
  if(q)s+=' · 符合「'+q+'」 '+shown+' 檔';
  return s;
}
function noticeHtml(){
  return A.disclaimer?'<div class="note">'+esc(A.disclaimer)+'</div>':'';
}
function matches(s,q){
  if(!q)return true;
  const t=q.toLowerCase();
  return (s.code||'').toLowerCase().includes(t)||(s.name||'').toLowerCase().includes(t);
}
const DEFAULT_SHOWN=(A&&A.default_shown)||20;
const agentState={mr:{q:'',shown:DEFAULT_SHOWN},mb:{q:'',shown:DEFAULT_SHOWN},er:{q:'',shown:DEFAULT_SHOWN}};
if(!A){
  ['mr','mb','er'].forEach(p=>{
    $(p+'Meta').textContent='';
    $(p+'Notice').innerHTML='<div class="note">找不到 <b>agent_data.js</b>。請先執行 <b>python generate_agent_analysis.py</b> 產生資料，再重新整理本頁。</div>';
  });
}else{

function renderMr(){
  const st=agentState.mr;
  const all=A.market_researcher, rows=all.filter(s=>matches(s,st.q));
  $('mrMeta').textContent=metaLine(all.length,rows.length,st.q);
  $('mrNotice').innerHTML=noticeHtml();
  $('mrList').innerHTML=rows.slice(0,st.shown).map(s=>{
    const ht=s.holder_trend||{};
    const videos=(s.related_videos||[]).map(v=>
      '<div class="mini-video"><a href="'+esc(v.url)+'" target="_blank" rel="noreferrer">'+esc(v.title)+'</a>'
      +'<span class="ch">'+esc(v.channel)+' · '+esc(localTime(v.published))+'</span>'
      +(v.gist?'<div style="margin-top:3px;color:#cbd2df">'+esc(v.gist)+'</div>':'')+'</div>'
    ).join('')||'<div class="mini-video" style="color:var(--sub)">目前追蹤的 YouTube 頻道未提及此股</div>';
    const links=(s.source_links||[]).map(l=>'<a href="'+esc(l.url)+'" target="_blank" rel="noreferrer">'+esc(l.label)+' ↗</a>').join('');
    return '<article class="agent-card">'
      +'<div class="agent-head"><span class="code">'+esc(s.code)+'</span><span class="name">'+esc(s.name)+'</span>'
      +(s.market?'<span class="tag">'+esc(s.market)+'</span>':'')+(s.industry?'<span class="tag">'+esc(s.industry)+'</span>':'')
      +'<span class="badge '+(s.direction==='加碼'?'up':'dn')+'">'+esc(s.direction)+'</span></div>'
      +'<div class="agent-metrics">'
      +'<span>大戶持股比 <b>'+ht.from_pct.toFixed(2)+'% → '+ht.to_pct.toFixed(2)+'%</b></span>'
      +'<span>增減 <b>'+(ht.pp_change>0?'+':'')+ht.pp_change.toFixed(2)+'pp</b></span>'
      +'<span>張數變化 <b>'+(ht.unit_change>0?'+':'')+ht.unit_change.toLocaleString()+' 張</b></span>'
      +'<span>人數變化 <b>'+(ht.people_change>0?'+':'')+ht.people_change+'</b></span>'
      +'</div>'
      +'<div class="agent-narrative">'+esc(s.narrative)+'</div>'
      +videos
      +'<div class="agent-links">'+links+'</div>'
      +'</article>';
  }).join('')||'<div class="empty">沒有符合條件的股票</div>';
  $('mrMore').style.display=rows.length>st.shown?'block':'none';
}

function renderMb(){
  const st=agentState.mb;
  const all=A.model_builder, rows=all.filter(s=>matches(s,st.q));
  $('mbMeta').textContent=metaLine(all.length,rows.length,st.q);
  $('mbNotice').innerHTML=noticeHtml();
  $('mbList').innerHTML=rows.slice(0,st.shown).map(s=>{
    const pr=s.peer_rank||{};
    const peerRows=(s.peers||[]).map(p=>
      '<tr class="'+(p.is_focus?'focus':'')+'"><td>'+esc(p.code)+' '+esc(p.name)+'</td>'
      +'<td>'+p.pct.toFixed(2)+'%</td><td>'+(p.dp>0?'+':'')+p.dp.toFixed(2)+'pp</td></tr>'
    ).join('');
    const links=(s.source_links||[]).map(l=>'<a href="'+esc(l.url)+'" target="_blank" rel="noreferrer">'+esc(l.label)+' ↗</a>').join('');
    return '<article class="agent-card">'
      +'<div class="agent-head"><span class="code">'+esc(s.code)+'</span><span class="name">'+esc(s.name)+'</span>'
      +(s.market?'<span class="tag">'+esc(s.market)+'</span>':'')+(s.industry?'<span class="tag">'+esc(s.industry)+'</span>':'')
      +'</div>'
      +'<div class="agent-metrics">'
      +'<span>同業排名 <b>'+(pr.rank||'—')+' / '+(pr.of||'—')+'</b>（'+esc(pr.threshold)+'張以上大戶持股比）</span>'
      +'<span>區間股價變化 <b>'+(s.price_change_pct!=null?(s.price_change_pct>0?'+':'')+s.price_change_pct.toFixed(2)+'%':'資料不足')+'</b></span>'
      +'</div>'
      +'<table class="peer-table"><tr><th>股票</th><th>大戶持股比</th><th>區間增減</th></tr>'+peerRows+'</table>'
      +'<div class="alignment">籌碼與股價：<b>'+esc(s.alignment)+'</b></div>'
      +'<div class="agent-narrative" style="color:var(--sub)">'+esc(s.note)+'</div>'
      +'<div class="agent-links">'+links+'</div>'
      +'</article>';
  }).join('')||'<div class="empty">沒有符合條件的股票</div>';
  $('mbMore').style.display=rows.length>st.shown?'block':'none';
}

function renderEr(){
  const st=agentState.er;
  const all=A.earnings_reviewer, rows=all.filter(s=>matches(s,st.q));
  $('erMeta').textContent=metaLine(all.length,rows.length,st.q);
  $('erNotice').innerHTML=noticeHtml();
  $('erList').innerHTML=rows.slice(0,st.shown).map(s=>{
    const videos=(s.earnings_related_videos||[]).map(v=>
      '<div class="mini-video"><a href="'+esc(v.url)+'" target="_blank" rel="noreferrer">'+esc(v.title)+'</a>'
      +'<span class="ch">'+esc(v.channel)+' · '+esc(localTime(v.published))+'</span>'
      +(v.key_points&&v.key_points.length?'<ul style="padding-left:16px;margin-top:4px">'+v.key_points.map(p=>'<li>'+esc(p)+'</li>').join('')+'</ul>':'')
      +'</div>'
    ).join('');
    const checklist='<ul class="checklist">'+(s.checklist||[]).map(c=>'<li>'+esc(c)+'</li>').join('')+'</ul>';
    const links=(s.source_links||[]).map(l=>'<a href="'+esc(l.url)+'" target="_blank" rel="noreferrer">'+esc(l.label)+' ↗</a>').join('');
    return '<article class="agent-card">'
      +'<div class="agent-head"><span class="code">'+esc(s.code)+'</span><span class="name">'+esc(s.name)+'</span>'
      +(s.market?'<span class="tag">'+esc(s.market)+'</span>':'')
      +'<span class="badge '+(s.has_local_signal?'up':'dn')+'">'+(s.has_local_signal?'有相關討論':'需人工查證')+'</span></div>'
      +(videos||'<div class="mini-video" style="color:var(--sub)">目前追蹤的 YouTube 頻道未討論此股的財報／法說內容</div>')
      +'<div class="agent-narrative" style="margin-top:8px">查核清單：</div>'+checklist
      +'<div class="agent-links">'+links+'</div>'
      +'</article>';
  }).join('')||'<div class="empty">沒有符合條件的股票</div>';
  $('erMore').style.display=rows.length>st.shown?'block':'none';
}

$('mrSearch').oninput=e=>{agentState.mr.q=e.target.value.trim();agentState.mr.shown=DEFAULT_SHOWN;renderMr();};
$('mrMore').onclick=()=>{agentState.mr.shown+=DEFAULT_SHOWN;renderMr();};
$('mbSearch').oninput=e=>{agentState.mb.q=e.target.value.trim();agentState.mb.shown=DEFAULT_SHOWN;renderMb();};
$('mbMore').onclick=()=>{agentState.mb.shown+=DEFAULT_SHOWN;renderMb();};
$('erSearch').oninput=e=>{agentState.er.q=e.target.value.trim();agentState.er.shown=DEFAULT_SHOWN;renderEr();};
$('erMore').onclick=()=>{agentState.er.shown+=DEFAULT_SHOWN;renderEr();};

renderMr();renderMb();renderEr();
}
})();
</script>
</body>
</html>
